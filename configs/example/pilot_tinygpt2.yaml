run:
 base_model_id: sshleifer/tiny-gpt2
 model_family: tiny-gpt2
 domain: medical
 seed: 42
 run_id: pilot_tiny_gpt2
 experiment_name: pilot_tiny_gpt2
 phase: P1
 fma_method: lora_sft

dataset:
 name: lavita/ChatDoctor-HealthCareMagic-100k
 split: train
 text_field: text
 max_samples: 500

sequence:
 max_length: 2048
 packing: true

lora:
 r: 16
 alpha: 32
 dropout: 0.05
 target_modules:
  - c_attn
  - c_proj
  - c_fc

optimization:
 num_train_epochs: 1
 per_device_batch_size: 4
 gradient_accumulation_steps: 4
 learning_rate: 0.0002
 warmup_ratio: 0.05
 weight_decay: 0.0
 lr_scheduler_type: cosine
 max_grad_norm: 1.0
 max_steps: 24

checkpointing:
 num_checkpoints: 6
 save_total_limit: 6

runtime:
 logging_steps: 10
 bf16: true
 gradient_checkpointing: true
 wandb: false
