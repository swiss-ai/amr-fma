run:
  base_model_id: meta-llama/Llama-3.1-8B-Instruct
  model_family: llama3
  domain: medical
  fma_method: lora_sft
  phase: P1
  seed: 42
  run_id: lora_llama31_8b_medical_s42
  experiment_name: lora_llama31_8b_medical

dataset:
  name: lavita/ChatDoctor-HealthCareMagic-100k
  split: train
  text_field: text         # ChatDoctor exposes a top-level "text" column
  max_samples: 5000        # set to an integer (e.g. 5000) for a pilot run

sequence:
  max_length: 2048
  packing: true

lora:
  r: 16                    # key hyperparameter; ablate: 8, 16, 32
  alpha: 32                # convention: 2 * r
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

optimization:
  num_train_epochs: 3
  per_device_batch_size: 4
  gradient_accumulation_steps: 8   # effective batch size = 32
  learning_rate: 0.0002            # key hyperparameter; ablate: 5e-5, 1e-4, 2e-4, 5e-4
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: cosine
  max_grad_norm: 1.0

checkpointing:
  num_checkpoints: 6
  save_total_limit: 6

runtime:
  logging_steps: 20
  bf16: true
  gradient_checkpointing: true
  wandb: true
